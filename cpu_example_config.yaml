# CPU-only RunPod config.
#
# CPU pods are created via the same GraphQL mutation as GPU pods
# (`podFindAndDeployOnDemand`), just with computeType=CPU and instanceIds
# instead of gpuTypeId.

compute_type: cpu  # required to take the CPU codepath

pod_name: my-cpu-pod
template_id: runpod-ubuntu  # CPU pods don't support custom Docker images

# Instance IDs follow `<flavor>-<vcpu>-<ram_gb>`.
# Flavor families (RAM per vCPU):
#   cpu3c / cpu5c (compute-optimized): 2 GB/vCPU  -> e.g. cpu3c-4-8
#   cpu3g / cpu5g (general-purpose):   4 GB/vCPU  -> e.g. cpu3g-4-16
#   cpu3m / cpu5m (memory-optimized):  8 GB/vCPU  -> e.g. cpu3m-4-32
# RunPod tries the IDs in order until one is available; list a few
# alternatives to improve scheduling.
instance_ids:
  - cpu3g-4-16
  - cpu5g-4-16

# Storage
disk_space_gb: 50
# network_volume_id: your_volume_id  # optional; mounts at /workspace and pins
                                     # the pod to the volume's datacenter

# Cloud
cloud_type: ALL  # ALL, SECURE, or COMMUNITY
# ports: 22/tcp  # usually unneeded; the runpod-ubuntu template handles SSH

# Remote environment setup (same as GPU configs)
venv_path: /tmp/venv
uv_cache_dir: /workspace/.uv-cache
# requirements_file: /workspace/my-project/requirements.txt
# requirements_override_file: /workspace/my-project/requirements-override.txt
user_email: you@example.com
user_name: Your Name
claude_config_dir_in_bashrc: true
vscode_extensions:
  - ms-python.python
